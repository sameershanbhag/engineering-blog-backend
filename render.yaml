# Render blueprint — provisions a Postgres DB + the FastAPI web service.
# Create via Render dashboard → New → Blueprint → connect this repo.
# Auto-deploys on every push to main.

databases:
  - name: engineering-blog-db
    plan: free

services:
  - type: web
    name: engineering-blog-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: engineering-blog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://engineering-blog-lilac.vercel.app,http://localhost:3000"
